name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Verify debug keystore
        run: |
          test -f app/debug.keystore || { echo "ERROR: debug.keystore missing"; exit 1; }
          keytool -list -keystore app/debug.keystore -storepass android -alias androiddebugkey 2>/dev/null && echo "Keystore verified"

      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/habitao-${{ steps.version.outputs.version }}-debug.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Habitao ${{ steps.version.outputs.version }}
          body: |
            ## Habitao ${{ steps.version.outputs.version }}
            
            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" in your Android settings
            3. Install the APK
            
            ### Requirements
            - Android 8.0+ (API 26+)
            
            ### What's New
            See the [DEVELOPMENT-LOG.md](https://github.com/anupamabhay/Habitao/blob/dev/DEVELOPMENT-LOG.md) for details.
          files: |
            app/build/outputs/apk/debug/habitao-${{ steps.version.outputs.version }}-debug.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
