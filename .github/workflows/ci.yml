name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

# Cancel previous runs if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality (Detekt + Ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Detekt baseline
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Detekt
        run: ./gradlew detekt
      
      - name: Run Ktlint Check
        run: ./gradlew ktlintCheck
      
      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            build/reports/detekt/
            **/build/reports/detekt/
          retention-days: 7
      
      - name: Annotate Code Quality Issues
        if: failure()
        run: |
          echo "::error::Code quality checks failed. Review Detekt and Ktlint reports."

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Unit Tests (Domain)
        run: ./gradlew :domain:test
      
      - name: Run Unit Tests (Data)
        run: ./gradlew :data:testDebugUnitTest
      
      - name: Run Unit Tests (Features)
        run: |
          ./gradlew :feature:habits:testDebugUnitTest
      
      - name: Run Unit Tests (Core)
        run: |
          ./gradlew :core:common:test \
                    :core:ui:testDebugUnitTest
      
      - name: Generate Test Coverage Report
        if: always()
        run: ./gradlew jacocoTestReport
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
      
      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 7
      
      - name: Comment Test Results on PR
        if: github.event_name == 'pull_request' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/build/test-results/**/*.xml

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [code-quality, unit-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
      
      - name: Check APK Size
        run: |
          APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk | cut -f1)
          echo "::notice::Debug APK Size: $APK_SIZE"
          
          # Check if APK is larger than 20MB (warning threshold)
          APK_SIZE_MB=$(du -m app/build/outputs/apk/debug/*.apk | cut -f1)
          if [ $APK_SIZE_MB -gt 20 ]; then
            echo "::warning::APK size ($APK_SIZE) is larger than 20MB. Consider optimizing."
          fi

  # ============================================================================
  # Integration Tests (Android Instrumented)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest  # Required for Android emulator
    timeout-minutes: 45
    needs: [code-quality]
    
    strategy:
      matrix:
        api-level: [26, 34]  # Test on min SDK and latest
        target: [google_apis]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}
      
      - name: Create AVD and Generate Snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."
      
      - name: Run Integration Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest
      
      - name: Upload Integration Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-api${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          retention-days: 7

  # ============================================================================
  # Dependency Vulnerability Check
  # ============================================================================
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on schedule (weekly) or manually, not on every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Dependency Check
        run: ./gradlew dependencyCheckAnalyze
      
      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
          retention-days: 30

  # ============================================================================
  # Success Summary
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, build, integration-tests]
    if: always()
    
    steps:
      - name: Check All Jobs
        run: |
          if [[ "${{ needs.code-quality.result }}" == "success" && \
                "${{ needs.unit-tests.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "::notice::✅ All CI checks passed!"
            exit 0
          else
            echo "::error::❌ Some CI checks failed. Review the logs above."
            exit 1
          fi
